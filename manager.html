<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">
    <h2 class="mb-4">📋 Manager Dashboard</h2>
    <div id="ordersContainer" class="row g-4"></div>
</div>

<script>
function loadOrders() {
    fetch('/api/orders')
        .then(res => res.json())
        .then(data => {
            let container = document.getElementById('ordersContainer');
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = "<p>No active orders</p>";
                return;
            }

            data.forEach(order => {
                let itemsHTML = "";

                for (let item in order.items) {
                    itemsHTML += `<li>${item} x ${order.items[item]}</li>`;
                }

                container.innerHTML += `
                <div class="col-md-4">
                    <div class="card p-3">
                        <h5>Order #${order.id}</h5>
                        <p><strong>Table:</strong> ${order.table}</p>
                        <p><strong>Time:</strong> ${order.time}</p>

                        <ul>${itemsHTML}</ul>

                        <h6>Total: ₹${order.total}</h6>

                        <button class="btn btn-success w-100 mt-2"
                            onclick="completeOrder(${order.id})">
                            Complete
                        </button>
                    </div>
                </div>
                `;
            });
        });
}

function completeOrder(id) {
    fetch(`/api/complete_order/${id}`, {
        method: 'POST'
    }).then(() => loadOrders());
}

setInterval(loadOrders, 3000);
loadOrders();
</script>

</body>
</html>
